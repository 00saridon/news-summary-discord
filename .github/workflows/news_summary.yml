name: 뉴스 요약 자동화

on:
  schedule:
    - cron: '40 23 * * *'  # KST 08:40 (UTC 23:40)
  workflow_dispatch:

jobs:
  news-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 요약 및 디스코드 전송
        env:
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
          DISCORD_WEBHOOK_3: ${{ secrets.DISCORD_WEBHOOK_3 }}
        run: python 뉴스요약/main.py
